spring.application.name=transactionService
server.port=8089

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bankguard_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Enrichment Service Configuration
enrichment.service.url=http://localhost:8010

# Logging
logging.level.root=INFO
logging.level.com.bankguard.transactionservice=DEBUG

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
``